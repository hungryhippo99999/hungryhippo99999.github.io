<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wikipedia</title>
    <link rel="icon" href="https://upload.wikimedia.org/wikipedia/commons/7/75/Wikipedia_mobile_app_logo.png">
    <style>
        :root {
            --bg-dark: #0a0a0f;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --accent: #af40ff;
            --accent-secondary: #5b42f3;
            --accent-tertiary: #00ddeb;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 20% 50%, rgba(175, 64, 255, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(0, 221, 235, 0.1) 0%, transparent 50%);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            line-height: 1.6;
            min-height: 100vh;
            padding-bottom: 120px;
            overflow-x: hidden;
        }

        /* Header Section */
        header {
            background: linear-gradient(180deg, rgba(0,0,0,0.4) 0%, transparent 100%);
            padding: 2rem 1.5rem 1rem;
            border-bottom: 1px solid var(--card-border);
            margin-bottom: 2rem;
        }

        .header-content {
            max-width: 100%;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff 0%, #af40ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
        }

        .version {
            font-size: 0.9rem;
            color: var(--accent);
            font-weight: 600;
            background: rgba(175, 64, 255, 0.1);
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            border: 1px solid rgba(175, 64, 255, 0.2);
        }
        
        .warning {
            max-width: 100%;
            margin: 0 auto;
            padding: 0.8rem 1.5rem;
            background: rgba(255, 193, 7, 0.1);
            border-left: 3px solid #ffc107;
            color: #ffc107;
            font-size: 0.85rem;
            margin-top: 1rem;
            border-radius: 4px;
        }

        /* Navigation Pills - Custom Colors */
        .nav-pills {
            display: flex;
            gap: 0.75rem;
            align-items: center;
        }

        .nav-pill {
            position: relative;
            padding: 0.6rem 1.5rem;
            border: none;
            border-radius: 50px;
            color: white;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-family: inherit;
        }

        /* Media Button - Red to Orange */
        .nav-pill.media-pill {
            background: linear-gradient(135deg, rgb(255, 54, 54), rgb(255, 120, 35));
            box-shadow: 0 4px 15px rgba(255, 54, 54, 0.4);
        }

        .nav-pill.media-pill:hover {
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 6px 20px rgba(255, 54, 54, 0.6);
        }

        /* Games Button - Green to Blue */
        .nav-pill.games-pill {
            background: linear-gradient(135deg, rgb(162, 203, 56), rgb(97, 135, 0));
            box-shadow: 0 4px 15px rgba(162, 203, 56, 0.4);
        }

        .nav-pill.games-pill:hover {
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 6px 20px rgba(162, 203, 56, 0.6);
        }

        .nav-pill::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }

        .nav-pill:hover::before {
            left: 100%;
        }

        .nav-pill:active {
            transform: translateY(0) scale(0.98);
        }

        /* Main Container - Single Column */
        .container {
            max-width: 80%;
            margin: 0 auto;
            padding: 0 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        /* Cards */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 1.5rem;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            width: 100%;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            border-color: rgba(175, 64, 255, 0.2);
        }

        .card h2 {
            font-size: 1.1rem;
            color: var(--text-primary);
            margin-bottom: 1.2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 600;
        }

        .card h2::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 20px;
            background: linear-gradient(180deg, var(--accent), var(--accent-tertiary));
            border-radius: 2px;
        }

        /* Button Grid */
        .button-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 0.8rem;
        }

        button {
            position: relative;
            background: linear-gradient(135deg, rgba(175, 64, 255, 0.1), rgba(91, 66, 243, 0.05));
            border: 1px solid rgba(175, 64, 255, 0.2);
            border-radius: 10px;
            color: white;
            padding: 0.9rem 1rem;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            width: 100%;
            font-family: inherit;
        }

        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }

        button:hover {
            background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
            border-color: transparent;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(175, 64, 255, 0.3);
        }

        button:hover::before {
            left: 100%;
        }

        button:active {
            transform: translateY(0) scale(0.98);
        }

        /* Single button full width style */
        .single-button {
            width: 100%;
        }

        /* Special descriptive text */
        .card-note {
            margin-top: 0.8rem;
            padding: 0.8rem;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            border: 1px solid var(--card-border);
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        /* Page Transition Animation */
        .page-transition {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .transition-circle {
            width: 0;
            height: 0;
            border-radius: 50%;
            background: var(--bg-dark);
            position: absolute;
            transform: translate(-50%, -50%);
            transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1), 
                        height 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .transition-circle.expanding {
            width: 300vmax;
            height: 300vmax;
        }

        /* Loading Indicator */
        .loading-indicator {
            position: absolute;
            z-index: 10001;
            color: white;
            font-size: 1.5rem;
            font-weight: 600;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.3s ease, transform 0.3s ease;
            text-shadow: 0 0 20px rgba(175, 64, 255, 0.5);
            pointer-events: none;
        }

        .loading-indicator.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .loading-indicator::after {
            content: '';
            display: inline-block;
            width: 3px;
            height: 1.2em;
            background: linear-gradient(180deg, var(--accent), var(--accent-tertiary));
            margin-left: 0.5rem;
            animation: blink 1s infinite;
            vertical-align: middle;
            border-radius: 2px;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        .old-content {
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        .old-content.fading {
            opacity: 0;
            transform: scale(1.1);
            pointer-events: none;
        }

        /* New Page Container - For fetched content */
        .new-page-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10000;
            background: var(--bg-dark);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease 0.4s;
            overflow: auto;
        }

        .new-page-container.visible {
            opacity: 1;
            pointer-events: all;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .header-content {
                flex-direction: column;
                text-align: center;
            }
            
            .nav-pills {
                width: 100%;
                justify-content: center;
            }

            .nav-pill {
                padding: 0.5rem 1.2rem;
                font-size: 0.8rem;
            }
            
            .button-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-content">
            <div class="brand">
                <h1>AI</h1>
                <span class="version">v1.0.2 (Δ)</span>
                <nav class="nav-pills">
                    <button class="nav-pill media-pill" onclick="navigateToPage('media', event)">
                        Media
                    </button>
                    <button class="nav-pill games-pill" onclick="navigateToPage('games', event)">
                        Games
                    </button>
                </nav>
            </div>
            <div style="width: 100px;"></div>
        </div>
        <div class="warning">
            ⚠️ To get the best answers from AI, make sure Reasoning/Thinking and Web Search is enabled.
        </div>
    </header>

    <div id="mainWrapper">
        <div class="old-content" id="pageContent">
            <div class="container">
                
                <!-- AI Search Engines -->
                <section class="card">
                    <h2>Copilot Alternatives (will show up on GoGuardian)</h2>
                    <div class="button-grid">
                        <button onclick="qwen()">Qwen</button>
                        <button onclick="duck()">DuckAI</button>
                        <button onclick="zai()">Z.ai</button>
                    </div>
                </section>


                <!-- Other AI -->
                <section class="card">
                    <h2>Other AI</h2>
                    <div class="button-grid">
                        <button onclick="together()">Together.ai</button>
                        <button onclick="long()">LongCat</button>
                        <button onclick="solar()">Solar</button>
                        <button onclick="reka()">Reka</button>
                        <button onclick="olmo()">Olmo</button>
                        <button onclick="kimi()">Kimi</button>
                    </div>
                </section>
                
                <!-- ChatGPT 5 -->
                <section class="card">
                    <h2>Free ChatGPT</h2>
                    <div class="button-grid">
                        <button onclick="heck()">HeckAI</button>
                        <button onclick="ish()">ISH</button>
                        <button onclick="freegpt()">FreeGPT</button>
                        <button onclick="lite()">Lite-GPT</button>
                    </div>
                </section>

                <!-- API -->
                <section class="card">
                    <h2>Need your own API</h2>
                    <button onclick="libre()" class="single-button">LibreChat</button>
                    <div class="card-note">
                        Use AI with free API keys
                    </div>
                </section>

            </div>
        </div>
    </div>

    <!-- Transition Overlay -->
    <div class="page-transition" id="transitionOverlay" style="display: none;">
        <div class="transition-circle" id="transitionCircle"></div>
        <div class="loading-indicator" id="loadingIndicator">Loading...</div>
    </div>

    <!-- New Page Container (for fetched content) -->
    <div class="new-page-container" id="newPageContainer"></div>

    <script>
        // optimized iframe
        function oframe(url) {
            var win = window.open();
            win.document.body.style.margin = '0';
            win.document.body.style.height = '100vh';
            var iframe = win.document.createElement('iframe');
            iframe.style.width = "100%";
            iframe.style.height = "100%";
            iframe.style.border = "none";
            iframe.style.margin = '0';
            iframe.src = url;
            iframe.setAttribute("allowfullscreen", "true");
            win.document.body.appendChild(iframe);
        }
        
        function ourl(url) {
            window.open(url, '_blank');
        }
        
        // unhidden ai
        function qwen() {ourl("https://chat.qwen.ai/");}
        function duck() {ourl("https://duck.ai/chat");}
        function zai() {ourl("https://chat.z.ai/");}

        // alt ai
        function together() {oframe("https://chat.together.ai/");}
        function long() {oframe("https://longcat.chat/");}
        function solar() {oframe("https://console.upstage.ai/playground/chat");}
        function reka() {oframe("https://app.reka.ai/chat");}
        function olmo() {oframe("https://playground.allenai.org/");}
        function kimi() {oframe("https://www.kimi.com/");}
        
        // multi chatbots
        function heck() {oframe("https://heck.ai/");}
        function ish() {oframe("https://ish.junioralive.in/");}
        function freegpt() {oframe("https://freegpt.tech/");}
        function lite() {oframe("https://link.fuckicoding.com/#/");}
        
        // image gen
        function dezgo() {oframe("https://dezgo.com/");}
        function flux() {oframe("https://black-forest-labs-flux-1-schnell.hf.space");}
        function prodia() {oframe("https://app.prodia.com/");}
        function aigallery() {oframe("https://aigallery.app/");}
        

        // api
        function libre() {oframe("https://librechat-librechat.hf.space/c/");}

        // Navigation to other pages
        function openGithubPage(pageName) {
            const newWin = window.open('about:blank');
            fetch(`https://hungryhippo99999.github.io/${pageName}.html`)
                .then(res => {
                    if (!res.ok) throw new Error(`Failed to load ${pageName}: ${res.status}`);
                    return res.text();
                })
                .then(html => {
                    newWin.document.open();
                    newWin.document.write(html);
                    newWin.document.close();
                })
                .catch(err => {
                    newWin.document.body.innerHTML = `<pre style="color:red;">Error loading ${pageName}: ${err.message}</pre>`;
                });
        }

        function mediaPage() { openGithubPage('media'); }
        function gamesPage() { openGithubPage('games'); }
        function mcPage() { openGithubPage('mc'); }
        function chat() {oframe("https://e.widgetbot.io/channels/1408137875697959164/1408148022914842688");}

        // Helper function to execute scripts in the injected HTML
        function executeScripts(container) {
            const scripts = container.querySelectorAll('script');
            scripts.forEach(oldScript => {
                const newScript = document.createElement('script');
                Array.from(oldScript.attributes).forEach(attr => {
                    newScript.setAttribute(attr.name, attr.value);
                });
                newScript.appendChild(document.createTextNode(oldScript.innerHTML));
                oldScript.parentNode.replaceChild(newScript, oldScript);
            });
        }

        // Navigation function for pill buttons with circular reveal animation
        function navigateToPage(pageName, event) {
            event.preventDefault();
            event.stopPropagation();
            
            const transitionOverlay = document.getElementById('transitionOverlay');
            const transitionCircle = document.getElementById('transitionCircle');
            const oldContent = document.getElementById('pageContent');
            const newPageContainer = document.getElementById('newPageContainer');
            const loadingIndicator = document.getElementById('loadingIndicator');
            
            if (!transitionOverlay || !transitionCircle || !oldContent || !newPageContainer) {
                console.error('Transition elements not found');
                return;
            }
            
            // Get click position from the button (currentTarget ensures we get the button, not child elements)
            const button = event.currentTarget;
            const rect = button.getBoundingClientRect();
            const x = rect.left + rect.width / 2;
            const y = rect.top + rect.height / 2;
            
            // Reset circle state
            transitionCircle.style.left = x + 'px';
            transitionCircle.style.top = y + 'px';
            transitionCircle.classList.remove('expanding');
            
            // Show overlay
            transitionOverlay.style.display = 'flex';
            
            // Start fade out of old content
            oldContent.classList.add('fading');
            
            // Show loading indicator
            loadingIndicator.classList.add('visible');
            
            // Trigger circle expansion after a brief delay
            requestAnimationFrame(() => {
                transitionCircle.classList.add('expanding');
            });
            
            const targetUrl = `https://hungryhippo99999.github.io/${pageName}.html`;
            
            // Fetch the content
            fetch(targetUrl)
                .then(res => {
                    if (!res.ok) throw new Error(`Failed to load ${pageName}: ${res.status}`);
                    return res.text();
                })
                .then(html => {
                    // Wait for transition animation
                    setTimeout(() => {
                        // Clear previous content
                        newPageContainer.innerHTML = '';
                        
                        // Set new HTML content
                        newPageContainer.innerHTML = html;
                        
                        // Execute any scripts in the loaded content
                        executeScripts(newPageContainer);
                        
                        // Show new content
                        newPageContainer.classList.add('visible');
                        
                        // Hide loading indicator
                        loadingIndicator.classList.remove('visible');
                    }, 400);
                })
                .catch(err => {
                    setTimeout(() => {
                        newPageContainer.innerHTML = `
                            <div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;color:#ff4040;padding:2rem;">
                                <h2>Error loading ${pageName}</h2>
                                <p>${err.message}</p>
                                <button onclick="location.reload()" style="margin-top:1rem;padding:0.6rem 1.2rem;background:rgba(255,64,64,0.2);border:1px solid rgba(255,64,64,0.3);border-radius:50px;color:white;cursor:pointer;font-family:inherit;">Go Back</button>
                            </div>
                        `;
                        newPageContainer.classList.add('visible');
                        loadingIndicator.classList.remove('visible');
                    }, 400);
                });
        }
    </script>
</body>
</html>
