<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>notes2</title>
    <link rel="icon" href="https://png.pngtree.com/png-clipart/20230301/original/pngtree-red-play-button-clipart-png-image_8968161.png">
    <style>
        :root {
            --bg-dark: #0a0a0f;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --accent: #435CAF;
            --accent-secondary: #86A8E7;
            --accent-tertiary: #5FCCFB;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 20% 50%, rgba(67, 92, 175, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(95, 204, 251, 0.1) 0%, transparent 50%);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            line-height: 1.6;
            min-height: 100vh;
            padding-bottom: 120px;
            overflow-x: hidden;
        }

        /* Header Section */
        header {
            background: linear-gradient(180deg, rgba(0,0,0,0.4) 0%, transparent 100%);
            padding: 2rem 1.5rem 1rem;
            border-bottom: 1px solid var(--card-border);
            margin-bottom: 2rem;
        }

        .header-content {
            max-width: 100%;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff 0%, #5FCCFB 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
        }

        .version {
            font-size: 0.9rem;
            color: var(--accent-tertiary);
            font-weight: 600;
            background: rgba(67, 92, 175, 0.1);
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            border: 1px solid rgba(67, 92, 175, 0.2);
        }

        /* Navigation Pills - Using same styling as page buttons */
        .nav-pills {
            display: flex;
            gap: 0.75rem;
            align-items: center;
        }

        .nav-pill {
            position: relative;
            background: linear-gradient(135deg, rgba(67, 92, 175, 0.1), rgba(134, 168, 231, 0.05));
            border: 1px solid rgba(67, 92, 175, 0.2);
            border-radius: 50px;
            color: white;
            padding: 0.6rem 1.25rem;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-family: inherit;
            text-align: center;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 70px;
        }

        .nav-pill::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }

        .nav-pill:hover {
            background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
            border-color: transparent;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(67, 92, 175, 0.3);
        }

        .nav-pill:hover::before {
            left: 100%;
        }

        .nav-pill:active {
            transform: translateY(0) scale(0.98);
        }

        /* Main Container - Full width */
        .container {
            max-width: 100%;
            margin: 0 auto;
            padding: 0 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        /* Cards */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 1.5rem;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            width: 100%;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            border-color: rgba(67, 92, 175, 0.2);
        }

        .card h2 {
            font-size: 1.1rem;
            color: var(--text-primary);
            margin-bottom: 1.2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 600;
        }

        .card h2::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 20px;
            background: linear-gradient(180deg, var(--accent), var(--accent-tertiary));
            border-radius: 2px;
        }

        /* Two Column Layout */
        .two-column {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        @media (max-width: 900px) {
            .two-column {
                grid-template-columns: 1fr;
            }
        }

        /* Button Grid */
        .button-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 0.8rem;
        }

        button {
            position: relative;
            background: linear-gradient(135deg, rgba(67, 92, 175, 0.1), rgba(134, 168, 231, 0.05));
            border: 1px solid rgba(67, 92, 175, 0.2);
            border-radius: 10px;
            color: white;
            padding: 0.9rem 1rem;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            width: 100%;
            font-family: inherit;
        }

        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }

        button:hover {
            background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
            border-color: transparent;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(67, 92, 175, 0.3);
        }

        button:hover::before {
            left: 100%;
        }

        button:active {
            transform: translateY(0) scale(0.98);
        }

        /* Input Styling */
        .input-group {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            margin: 1rem 0;
        }

        input[type="text"] {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--card-border);
            border-radius: 10px;
            color: var(--text-primary);
            padding: 0.9rem 1rem;
            font-size: 0.9rem;
            font-family: inherit;
            flex: 1;
            transition: all 0.3s ease;
        }

        input[type="text"]::placeholder {
            color: var(--text-secondary);
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(67, 92, 175, 0.1);
        }

        select {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--card-border);
            border-radius: 10px;
            color: var(--text-primary);
            padding: 0.9rem 1rem;
            font-size: 0.9rem;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        select:focus {
            outline: none;
            border-color: var(--accent);
        }

        select option {
            background: var(--bg-dark);
            color: var(--text-primary);
        }

        .input-note {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 0.5rem;
            padding-left: 0.5rem;
        }

        /* Compact button for inputs */
        .btn-compact {
            width: auto !important;
            min-width: 100px;
            padding: 0.9rem 1.5rem !important;
        }

        /* Page Transition Animation */
        .page-transition {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .transition-circle {
            width: 0;
            height: 0;
            border-radius: 50%;
            background: var(--bg-dark);
            position: absolute;
            transform: translate(-50%, -50%);
            transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1), 
                        height 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .transition-circle.expanding {
            width: 300vmax;
            height: 300vmax;
        }

        /* Loading Indicator */
        .loading-indicator {
            position: absolute;
            z-index: 10001;
            color: white;
            font-size: 1.5rem;
            font-weight: 600;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.3s ease, transform 0.3s ease;
            text-shadow: 0 0 20px rgba(67, 92, 175, 0.5);
            pointer-events: none;
        }

        .loading-indicator.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .loading-indicator::after {
            content: '';
            display: inline-block;
            width: 3px;
            height: 1.2em;
            background: linear-gradient(180deg, var(--accent), var(--accent-tertiary));
            margin-left: 0.5rem;
            animation: blink 1s infinite;
            vertical-align: middle;
            border-radius: 2px;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        .old-content {
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        .old-content.fading {
            opacity: 0;
            transform: scale(1.1);
            pointer-events: none;
        }

        /* New Page Container - For fetched content */
        .new-page-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10000;
            background: var(--bg-dark);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease 0.4s;
            overflow: auto;
        }

        .new-page-container.visible {
            opacity: 1;
            pointer-events: all;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .header-content {
                flex-direction: column;
                text-align: center;
            }
            
            .nav-pills {
                width: 100%;
                justify-content: center;
            }

            .nav-pill {
                padding: 0.5rem 1rem;
                font-size: 0.8rem;
            }
            
            .button-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .input-group {
                flex-direction: column;
                align-items: stretch;
            }
            
            .btn-compact {
                width: 100% !important;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-content">
            <div class="brand">
                <h1>Δ</h1>
                <span class="version">v2.0.2</span>
                <nav class="nav-pills">
                    <button class="nav-pill" onclick="navigateToPage('media2', event)">
                        Media
                    </button>
                    <button class="nav-pill" onclick="navigateToPage('ai2', event)">

                    </button>

                        RFTube
                    </button>
                    <button class="nav-pill" onclick="openGithubPage('rftube2', event)">

                    </button>
                    <button class="nav-pill" onclick="openGithubPage('htmltester', event)">
                        HTML
                    </button>
                </nav>
            </div>
            <div style="width: 100px;"></div>
        </div>
    </header>

    <div id="mainWrapper">
        <div class="old-content" id="pageContent">
            <div class="container">
                
                <!--Tools -->
                <section class="card">
                    <h2>Tools</h2>
                    <div class="button-grid">
                        <button onclick="fmhy()">FMHY</button>
                        <button onclick="f1()">F1</button>

                    </div>
                </section>
                
                <!-- AI Tools -->
                <section class="card">
                    <h2>AI</h2>
                    <div class="button-grid">
                        <button onclick="kimi()">Kimi</button>
                        <button onclick="indi()">Indic</button>
                        <button onclick="gemini()">Gemini</button>
                        <button onclick="woozlit()">Woozlit</button>
                        <button onclick="long()">LongCat</button>
                        <button onclick="reka()">Reka</button>
                        <button onclick="olmo()">OLMo</button>
                        <button onclick="toge()">Together</button>
                        <button onclick="tymi()">TypingMind</button>
                        <button onclick="libre()">LibreChat</button>
                    </div>
                </section>

                <!-- URL Tools - Side by Side -->
                <div class="two-column">
                      
                    <!-- Direct URL -->
                    <section class="card">
                        <h2>Direct URL</h2>
                        <div class="input-group">
                            <input type="text" id="urlInput" placeholder="https://www.example.com"/>
                            <button onclick="getInputUrl()" class="btn-compact">Open</button>
                        </div>
                    </section>

                    <!-- Reddit Viewer -->
                    <section class="card">

                        <div class="input-group">
                            <input type="text" id="url-input" placeholder="https://www.reddit.com/ ..."/>
                            <button id="open-button" class="btn-compact">Open</button>
                            <select id="domain-select">
                                <option value="safereddit.com">1</option>
                                <option value="l.opnxng.com">2</option>

                            </select>
                        </div>
                    </section>

                <!-- Proxies -->
                <section class="card">
                    <h2>Proxy Services</h2>
                    <div class="button-grid">
                        <button onclick="scram()">ScramJet</button>

                <!-- Websites -->
                <section class="card">

                    <p class="input-note" style="margin-bottom: 1rem;">https://inv.nadeko.net</p>

                        <button onclick="fmhy2()">FMHY 2</button>

            </div>
        </div>
    </div>

    <!-- Transition Overlay -->
    <div class="page-transition" id="transitionOverlay" style="display: none;">
        <div class="transition-circle" id="transitionCircle"></div>
        <div class="loading-indicator" id="loadingIndicator">Loading...</div>
    </div>

    <!-- New Page Container (for fetched content) -->
    <div class="new-page-container" id="newPageContainer"></div>

    <script>
        // optimized iframe
        function oframe(url) {
            var win = window.open();
            win.document.body.style.margin = '0';
            win.document.body.style.height = '100vh';
            var iframe = win.document.createElement('iframe');
            iframe.style.width ="100%";
            iframe.style.height ="100%";
            iframe.style.border ="none";
            iframe.style.margin = '0';
            iframe.src = url;
            iframe.setAttribute("allowfullscreen","true");
            win.document.body.appendChild(iframe);
        }

        // Navigation to other pages
        function openGithubPage(pageName) {
            const newWin = window.open('about:blank');
            fetch(`https://hungryhippo99999.github.io/${pageName}.html`)
                .then(res => {
                    if (!res.ok) throw new Error(`Failed to load ${pageName}: ${res.status}`);
                    return res.text();
                })
                .then(html => {
                    newWin.document.open();
                    newWin.document.write(html);
                    newWin.document.close();
                })
                .catch(err => {
                    newWin.document.body.innerHTML = `<pre style="color:red;">Error loading ${pageName}: ${err.message}</pre>`;
                });
        }

        function getInputUrl() {
            var url = document.getElementById('urlInput').value;
            oframe(url);
        }

        function openFile(filePath) {
            window.open(filePath, '_blank');
        }

        function ourl(url) {
            window.open(url, '_blank');
        }
        
        const replaceUrl = document.getElementById('url-input');
        const domainSelect = document.getElementById('domain-select');
        const openButton = document.getElementById('open-button');

        openButton.addEventListener('click', () => {
            const originalUrl = replaceUrl.value;
            const selectedDomain = domainSelect.value;
            const newUrl = originalUrl.replace('www.reddit.com', selectedDomain);
            window.open(newUrl, '_blank');
        });

        // tools
        function fmhy() {oframe("https://fmhy.bid/");}
        function f1() {oframe("https://f1live.dpdns.org/watch");}
        function fars() {oframe("https://farside.link/");}
        function goth() {ourl("https://farside.link/gothub");}
        function emu() {oframe("https://demo.emulatorjs.org/");}

        // ai
        function kimi() {oframe("https://www.kimi.com/");}
        function indi() {oframe("https://arena.ai4bharat.org/#/chat/");}
        function gemini() {openGithubPage('geminichat');}
        function woozlit() {oframe("https://woozlit.com/");}
        function long() {oframe("https://longcat.chat/");}
        function reka() {oframe("https://app.reka.ai/chat");}
        function olmo() {oframe("https://playground.allenai.org/");}
        function toge() {oframe("https://chat.together.ai/");}
        function tymi() {oframe("https://www.typingmind.com/");}
        function libre() {oframe("https://librechat-librechat.hf.space/c/");}

        function fmhy2() {oframe("https://ffmhy.pages.dev/archive");}
        function pkmss() {oframe("https://ddaretrogamer.github.io/sword-and-shield-ultimate-plus-wiki/");} 
        
        // proxies
        function scram() {oframe("https://scramjet.mercurywork.shop/");}
        function ramh() {oframe("https://nearpod.gq");}
        function ramh2() {oframe("https://rammerhead-10.swanndvr.net/");}
        
        // randomize proxy
        const rammerheadUrls = [
         "https://azumanga-daioh.custom-gaming.net/",
         "https://discyoyan.kalbas.com.vn/"
        ];

        const otherUrls = [
         "https://www.example.com",
         "https://www.example.com"
        ];

        const urlLists = {
         "rammerheadUrls": rammerheadUrls,
         "otherUrls": otherUrls
        };
        
        function openRandomUrl(listName) {
          const selectedList = urlLists[listName];
        
          if (!selectedList || selectedList.length === 0) {
            console.error(`List '${listName}' not found or is empty.`);
            alert(`Sorry, the list '${listName}' is not available or empty.`);
            return;
          }
        
          const randomIndex = Math.floor(Math.random() * selectedList.length);
          const randomUrl = selectedList[randomIndex];
          console.log(`Opening random URL from ${listName}: ${randomUrl}`);
          oframe(randomUrl);
        }

        // Global transition state to prevent multiple simultaneous transitions
        let isTransitioning = false;

        // Navigation function for pill buttons with circular reveal animation
        function navigateToPage(pageName, event) {
            event.preventDefault();
            event.stopPropagation();
            
            // Prevent multiple clicks during transition
            if (isTransitioning) return;
            isTransitioning = true;
            
            // Get the transition elements from the TOP LEVEL document only
            const transitionOverlay = document.getElementById('transitionOverlay');
            const transitionCircle = document.getElementById('transitionCircle');
            const loadingIndicator = document.getElementById('loadingIndicator');
            const newPageContainer = document.getElementById('newPageContainer');
            const originalPageContent = document.getElementById('pageContent');
            
            if (!transitionOverlay || !transitionCircle || !newPageContainer) {
                console.error('Transition elements not found');
                isTransitioning = false;
                return;
            }
            
            // Find the currently visible content to fade out
            const isNewPageVisible = newPageContainer.classList.contains('visible');
            let currentContent = isNewPageVisible ? newPageContainer : originalPageContent;
            
            // Get click position from the button
            const button = event.currentTarget;
            const rect = button.getBoundingClientRect();
            const x = rect.left + rect.width / 2;
            const y = rect.top + rect.height / 2;
            
            // Reset circle state
            transitionCircle.style.left = x + 'px';
            transitionCircle.style.top = y + 'px';
            transitionCircle.classList.remove('expanding');
            
            // Show overlay
            transitionOverlay.style.display = 'flex';
            
            // Start fade out of current content
            if (currentContent) {
                currentContent.classList.add('fading');
            }
            
            // Show loading indicator
            loadingIndicator.classList.add('visible');
            
            // Trigger circle expansion
            requestAnimationFrame(() => {
                transitionCircle.classList.add('expanding');
            });
            
            const targetUrl = `https://hungryhippo99999.github.io/${pageName}.html`;
            
            // Fetch the content
            fetch(targetUrl)
                .then(res => {
                    if (!res.ok) throw new Error(`Failed to load ${pageName}: ${res.status}`);
                    return res.text();
                })
                .then(html => {
                    setTimeout(() => {
                        // Clear previous content in newPageContainer
                        newPageContainer.innerHTML = '';
                        
                        // Create an iframe to isolate the injected content completely
                        // This preserves all styles and prevents ID conflicts
                        const iframe = document.createElement('iframe');
                        iframe.style.width = '100%';
                        iframe.style.height = '100%';
                        iframe.style.border = 'none';
                        iframe.style.background = 'var(--bg-dark)';
                        iframe.id = 'pageFrame';
                        
                        newPageContainer.appendChild(iframe);
                        
                        // Write the HTML to the iframe
                        const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
                        iframeDoc.open();
                        iframeDoc.write(html);
                        iframeDoc.close();
                        
                        // Hide the original page content completely
                        if (originalPageContent) {
                            originalPageContent.style.display = 'none';
                            originalPageContent.classList.remove('fading');
                        }
                        
                        // Remove fading class from new container and show it
                        newPageContainer.classList.remove('fading');
                        newPageContainer.classList.add('visible');
                        
                        // Hide loading indicator
                        loadingIndicator.classList.remove('visible');
                        
                        // Reset transition state after animation completes
                        setTimeout(() => {
                            isTransitioning = false;
                        }, 800);
                    }, 400);
                })
                .catch(err => {
                    setTimeout(() => {
                        newPageContainer.innerHTML = `
                            <div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;color:#ff4040;padding:2rem;">
                                <h2>Error loading ${pageName}</h2>
                                <p>${err.message}</p>
                                <button onclick="location.reload()" style="margin-top:1rem;padding:0.6rem 1.2rem;background:rgba(255,64,64,0.2);border:1px solid rgba(255,64,64,0.3);border-radius:50px;color:white;cursor:pointer;font-family:inherit;">Go Back</button>
                            </div>
                        `;
                        
                        if (originalPageContent) {
                            originalPageContent.style.display = 'none';
                        }
                        newPageContainer.classList.add('visible');
                        loadingIndicator.classList.remove('visible');
                        isTransitioning = false;
                    }, 400);
                });
        }
    </script>
</body>
</html>
