<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media</title>
    <link rel="icon" href="https://png.pngtree.com/png-clipart/20230301/original/pngtree-red-play-button-clipart-png-image_8968161.png ">
    <style>
        :root {
            --bg-dark: #0f0f13;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --accent: #ff4040;
            --accent-secondary: #ff7823;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --hover-glow: rgba(255, 64, 64, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 20% 50%, rgba(255, 64, 64, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(255, 120, 35, 0.1) 0%, transparent 50%);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            line-height: 1.6;
            min-height: 100vh;
            padding-bottom: 100px;
            overflow-x: hidden;
        }

        /* Header Section */
        header {
            background: linear-gradient(180deg, rgba(0,0,0,0.4) 0%, transparent 100%);
            padding: 2rem 1.5rem 1rem;
            border-bottom: 1px solid var(--card-border);
            margin-bottom: 2rem;
            position: relative;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff 0%, #ff6b6b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
        }

        .version {
            font-size: 0.9rem;
            color: var(--accent);
            font-weight: 600;
            background: rgba(255, 64, 64, 0.1);
            padding: 0.35rem 0.7rem;
            border-radius: 20px;
            border: 1px solid rgba(255, 64, 64, 0.2);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }

        /* New Navigation Pills - Custom Colors */
        .nav-pills {
            display: flex;
            gap: 0.75rem;
            align-items: center;
        }

        .nav-pill {
            position: relative;
            padding: 0.6rem 1.5rem;
            border: none;
            border-radius: 50px;
            color: white;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* AI Button - Purple to Cyan */
        .nav-pill.ai-pill {
            background: linear-gradient(135deg, rgb(175, 64, 255), rgb(0, 221, 235));
            box-shadow: 0 4px 15px rgba(175, 64, 255, 0.4);
        }

        .nav-pill.ai-pill:hover {
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 6px 20px rgba(175, 64, 255, 0.6);
        }

        /* Games Button - Green to Blue */
        .nav-pill.games-pill {
            background: linear-gradient(135deg, rgb(162, 203, 56), rgb(97, 135, 0));
            box-shadow: 0 4px 15px rgba(162, 203, 56, 0.4);
        }

        .nav-pill.games-pill:hover {
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 6px 20px rgba(162, 203, 56, 0.6);
        }

        .nav-pill::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }

        .nav-pill:hover::before {
            left: 100%;
        }

        .nav-pill:active {
            transform: translateY(0) scale(0.98);
        }

        .warning {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0.8rem 1.5rem;
            background: rgba(255, 193, 7, 0.1);
            border-left: 3px solid #ffc107;
            color: #ffc107;
            font-size: 0.85rem;
            margin-top: 1rem;
            border-radius: 4px;
        }

        /* Main Container - Updated for 3-column masonry layout */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 1.5rem;
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* Three columns */
            grid-auto-rows: minmax(180px, auto);
            gap: 2rem;
            position: relative;
            z-index: 1;
        }

        /* Cards */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 1.5rem;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            height: 100%;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            border-color: rgba(255, 64, 64, 0.2);
        }

        /* Movies card spans 2 rows on the left */
        .movies-card {
            grid-row: span 2;
        }

        /* Stacking container for half-height cards */
        .stack-column {
            display: flex;
            flex-direction: column;
            gap: 2rem;
            grid-row: span 2; /* Match movies card height */
        }

        /* Ensure cards inside stack fill height equally */
        .stack-column .card {
            flex: 1;
        }

        .card h2 {
            font-size: 1.1rem;
            color: var(--text-primary);
            margin-bottom: 1.2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 600;
        }

        .card h2::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 20px;
            background: linear-gradient(180deg, var(--accent), var(--accent-secondary));
            border-radius: 2px;
        }

        /* Button Grid */
        .button-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 0.8rem;
        }

        button {
            position: relative;
            background: linear-gradient(135deg, rgba(255, 64, 64, 0.1), rgba(243, 102, 66, 0.05));
            border: 1px solid rgba(255, 64, 64, 0.2);
            border-radius: 10px;
            color: white;
            padding: 0.9rem 1rem;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }

        button:hover {
            background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
            border-color: transparent;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255, 64, 64, 0.3);
        }

        button:hover::before {
            left: 100%;
        }

        button:active {
            transform: translateY(0) scale(0.98);
        }

        .yt-alt {
            margin-top: 0.8rem;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            border: 1px solid var(--card-border);
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .yt-alt a {
            color: var(--accent);
            text-decoration: none;
            border-bottom: 1px dotted var(--accent);
        }

        /* Page Transition Animation */
        .page-transition {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .transition-circle {
            width: 0;
            height: 0;
            border-radius: 50%;
            background: var(--bg-dark);
            position: absolute;
            transform: translate(-50%, -50%);
            transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1), 
                        height 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .transition-circle.expanding {
            width: 300vmax;
            height: 300vmax;
        }

        /* Loading Indicator */
        .loading-indicator {
            position: absolute;
            z-index: 10001;
            color: white;
            font-size: 1.5rem;
            font-weight: 600;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.3s ease, transform 0.3s ease;
            text-shadow: 0 0 20px rgba(255, 64, 64, 0.5);
            pointer-events: none;
        }

        .loading-indicator.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .loading-indicator::after {
            content: '';
            display: inline-block;
            width: 3px;
            height: 1.2em;
            background: linear-gradient(180deg, var(--accent), var(--accent-secondary));
            margin-left: 0.5rem;
            animation: blink 1s infinite;
            vertical-align: middle;
            border-radius: 2px;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        .old-content {
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        .old-content.fading {
            opacity: 0;
            transform: scale(1.1);
            pointer-events: none;
        }

        /* New Page Container - For fetched content */
        .new-page-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10000;
            background: var(--bg-dark);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease 0.4s;
            overflow: auto;
        }

        .new-page-container.visible {
            opacity: 1;
            pointer-events: all;
        }

        /* Responsive */
        @media (max-width: 1100px) {
            .container {
                grid-template-columns: repeat(2, 1fr); /* Back to 2 columns on smaller desktops */
            }
            
            .stack-column:nth-of-type(2) {
                grid-column: 2;
                grid-row: 2;
            }
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr; /* Single column on mobile */
            }
            
            .movies-card {
                grid-row: span 1; /* Don't span when stacked vertically */
                grid-column: 1;
            }
            
            .stack-column {
                grid-row: span 1;
                gap: 1.5rem;
            }
            
            .header-content {
                flex-direction: column;
                text-align: center;
            }

            .nav-pills {
                width: 100%;
                justify-content: center;
            }
        }

        @media (max-width: 600px) {
            .button-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .nav-pill {
                padding: 0.5rem 1.2rem;
                font-size: 0.8rem;
            }
        }
    </style>
</head>

        function openGithubPage(pageName) {

        function openRandomUrl(listName) {
            const selectedList = urlLists[listName];
            if (!selectedList || selectedList.length === 0) {
                alert(`Sorry, the list '${listName}' is not available or empty.`);

        // New navigation function for pill buttons with circular reveal animation
        // Fetches content like openGithubPage but displays in current page with animation
        function navigateToPage(pageName, event) {
            const transitionOverlay = document.getElementById('transitionOverlay');
            const transitionCircle = document.getElementById('transitionCircle');
            const oldContent = document.getElementById('pageContent');
            const newPageContainer = document.getElementById('newPageContainer');
            const loadingIndicator = document.getElementById('loadingIndicator');
            
            // Get click position for circle origin
            const rect = event.target.getBoundingClientRect();
            const x = rect.left + rect.width / 2;
            const y = rect.top + rect.height / 2;
            
            // Position circle at click point
            transitionCircle.style.left = x + 'px';
            transitionCircle.style.top = y + 'px';
            transitionCircle.classList.remove('expanding');
            
            // Show overlay and loading indicator
            transitionOverlay.style.display = 'flex';
            loadingIndicator.classList.add('visible');
            
            // Start fade out of old content
            oldContent.classList.add('fading');
            
            // Trigger circle expansion
            setTimeout(() => {
                transitionCircle.classList.add('expanding');
            }, 50);
            
            // FIXED: No space in URL for this function
            const targetUrl = `https://hungryhippo99999.github.io/${pageName}.html`;
            
            // Fetch the content
            fetch(targetUrl)
                .then(res => {
                    if (!res.ok) throw new Error(`Failed to load ${pageName}: ${res.status}`);
                    return res.text();
                })
                .then(html => {
                    // Wait for transition to complete then show content
                    setTimeout(() => {
                        newPageContainer.innerHTML = html;
                        newPageContainer.classList.add('visible');
                        loadingIndicator.classList.remove('visible');
                    }, 400);
                })
                .catch(err => {
                    setTimeout(() => {
                        newPageContainer.innerHTML = `
                            <div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;color:#ff4040;padding:2rem;">
                                <h2>Error loading ${pageName}</h2>
                                <p>${err.message}</p>
                                <button onclick="location.reload()" style="margin-top:1rem;padding:0.6rem 1.2rem;background:rgba(255,64,64,0.2);border:1px solid rgba(255,64,64,0.3);border-radius:50px;color:white;cursor:pointer;font-family:inherit;">Go Back</button>
                            </div>
                        `;
                        newPageContainer.classList.add('visible');
                        loadingIndicator.classList.remove('visible');
                    }, 400);
                });
        }
